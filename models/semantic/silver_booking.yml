version: 2

models:
  - name: silver_bookings
    description: "Consolidated model property file"
    config:
      materialized: table
      schema: silver

    # The semantic model lives right here inside the model entry
    semantic_model:
      enabled: true
    agg_time_dimension: booking_date
    columns:
    #Entities
      - name : booking_id
        entity: 
          name: bookingid
          type: primary
      - name: booking_lisitng_id
        entity: 
          name: bookinglisitngid
          type: foreign
    #Time Dimensions
      - name: booking_date
        granularity: day
        dimension:
          type: time
      
      - name: booking_created_at
        granularity: day
        dimension:
          type: time
      
    #Categorical 
      - name: booking_status
        dimension:
          type: categorical

    metrics:
      - name: sum_of_booking_amount
        type: simple
        agg: sum
        expr: booking_amount
      